<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  
  <!-- Favicon Options - Choose one of the following -->
  
  <!-- Option 1: Using PNG logo directly (Recommended) -->
  <link rel="icon" type="image/png" sizes="32x32" href="/src/assets/logo.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/src/assets/logo.png">
  
  <!-- Option 2: Apple Touch Icon (for iOS devices) -->
  <link rel="apple-touch-icon" sizes="180x180" href="/src/assets/logo.png">
  
  <!-- Option 3: SVG format (if you have SVG version) 
  <link rel="icon" type="image/svg+xml" href="/src/assets/logo.svg"> -->
  
  <!-- Fallback for older browsers -->
  <link rel="shortcut icon" href="/src/assets/logo.png">
  
  <!-- Additional meta tags for better SEO -->
  <meta name="description" content="Kedesh Limited - Digital Marketing, Video Production, and System Development in Tanzania">
  <meta name="keywords" content="Kedesh, Digital Marketing, Video Production, System Development, Tanzania, Dodoma">
  <meta name="author" content="Kedesh Limited">
  <meta name="theme-color" content="#2563eb">
  
  <!-- Open Graph tags for social media -->
  <meta property="og:title" content="Kedesh Limited">
  <meta property="og:description" content="Digital Marketing, Video Production, and System Development in Tanzania">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/src/assets/logo.png">
  
  <!-- Twitter Card tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Kedesh Limited">
  <meta name="twitter:description" content="Digital Marketing, Video Production, and System Development">
  <meta name="twitter:image" content="/src/assets/logo.png">
  
  <title>Kedesh Limited | Digital Innovation & Excellence</title>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
